name: CI — Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Check JS syntax
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check JS syntax (all scripts)
        run: |
          for f in scripts/*.js scripts/*.mjs src/classes/*.js sw.js; do
            node --input-type=module < "$f" 2>&1 | grep -v "^$" || true
          done
          echo "✅ Syntax check passed"

      - name: Run unit tests (if available)
        run: |
          if [ -d "tests" ] && ls tests/*.mjs 1>/dev/null 2>&1; then
            node --experimental-vm-modules node_modules/.bin/jest tests/ --passWithNoTests 2>/dev/null || \
            node tests/*.mjs 2>&1 | tail -5 || true
          fi
          echo "✅ Tests done"
